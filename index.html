<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Consulta BIN</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f6f7f9;
      color: #172033;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background:
        radial-gradient(circle at top left, rgba(56, 189, 248, 0.16), transparent 34%),
        linear-gradient(135deg, #f6f7f9 0%, #eef2f7 100%);
    }

    main {
      width: min(100%, 560px);
      background: #ffffff;
      border: 1px solid #d9e0ea;
      border-radius: 8px;
      box-shadow: 0 18px 46px rgba(20, 32, 54, 0.12);
      overflow: hidden;
    }

    header {
      padding: 28px 28px 20px;
      border-bottom: 1px solid #e5eaf0;
    }

    .brand {
      display: flex;
      align-items: center; justify-content: center;
      margin-bottom: 22px;
    }

    .brand-logo {
      width: min(176px, 64vw);
      height: auto;
      display: block;
    }

    h1 {
      margin: 0 0 8px;
      font-size: clamp(1.45rem, 4vw, 2rem);
      line-height: 1.12;
      letter-spacing: 0;
    }

    p {
      margin: 0;
      color: #5d6b82;
      line-height: 1.5;
    }

    form {
      display: grid;
      gap: 18px;
      padding: 24px 28px 28px;
    }

    label {
      display: grid;
      gap: 8px;
      font-weight: 700;
      color: #243149;
    }

    .hint {
      font-size: 0.88rem;
      font-weight: 500;
      color: #65738a;
    }

    input {
      width: 100%;
      min-height: 48px;
      border: 1px solid #c8d2df;
      border-radius: 6px;
      padding: 12px 14px;
      font: inherit;
      color: #172033;
      background: #ffffff;
      outline: none;
    }

    input:focus {
      border-color: #1677ff;
      box-shadow: 0 0 0 4px rgba(22, 119, 255, 0.12);
    }

    button {
      min-height: 48px;
      border: 0;
      border-radius: 6px;
      padding: 12px 18px;
      font: inherit;
      font-weight: 800;
      color: #ffffff;
      background: #1677ff;
      cursor: pointer;
    }

    button:hover {
      background: #0d66df;
    }

    button:disabled {
      cursor: wait;
      background: #8ea5c3;
    }

    .message {
      display: none;
      border-radius: 6px;
      padding: 12px 14px;
      line-height: 1.45;
      font-weight: 650;
    }

    .message.visible {
      display: block;
    }

    .message.error {
      color: #8a1f17;
      background: #fff0ed;
      border: 1px solid #fac7bd;
    }

    .message.info {
      color: #28466f;
      background: #eef6ff;
      border: 1px solid #bfdcff;
    }

    .result {
      display: none;
      border-top: 1px solid #e5eaf0;
      background: #fbfcfe;
      padding: 8px 28px 28px;
    }

    .result.visible {
      display: block;
    }

    dl {
      display: grid;
      gap: 0;
      margin: 0;
      border: 1px solid #dbe3ee;
      border-radius: 8px;
      overflow: hidden;
      background: #ffffff;
    }

    .row {
      display: grid;
      grid-template-columns: minmax(110px, 36%) 1fr;
      min-height: 52px;
      border-bottom: 1px solid #e7ecf3;
    }

    .row:last-child {
      border-bottom: 0;
    }

    dt,
    dd {
      margin: 0;
      padding: 14px;
      overflow-wrap: anywhere;
    }

    dt {
      font-weight: 800;
      color: #35445b;
      background: #f3f6fa;
    }

    dd {
      color: #172033;
    }

    @media (max-width: 460px) {
      body {
        padding: 14px;
      }

      header,
      form,
      .result {
        padding-left: 18px;
        padding-right: 18px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      dt {
        padding-bottom: 4px;
      }

      dd {
        padding-top: 4px;
      }
    }
  </style>
</head>
<body>
  <main>
    <header>
      <div class="brand">
        <img class="brand-logo" src="https://files.catbox.moe/0wx1sk.png" alt="Eco Memorial">
      </div>
      <h1>Consulta BIN</h1>
      <p>Digite somente os 8 primeiros números do cartão para consultar bandeira, banco, tipo e país.</p>
    </header>

    <form id="bin-form" autocomplete="off" novalidate>
      <label>
        BIN/IIN
        <span class="hint">Exatamente 8 números. Cartão completo não é aceito.</span>
        <input id="bin" name="bin" type="text" inputmode="numeric" pattern="[0-9]{8}" maxlength="8" placeholder="41111111">
      </label>

      <button id="submit" type="submit">Consultar</button>
      <div id="message" class="message" role="alert"></div>
    </form>

    <section id="result" class="result" aria-live="polite">
      <dl>
        <div class="row">
          <dt>Bandeira</dt>
          <dd id="scheme">-</dd>
        </div>
        <div class="row">
          <dt>Banco</dt>
          <dd id="issuer">-</dd>
        </div>
        <div class="row">
          <dt>Tipo</dt>
          <dd id="funding">-</dd>
        </div>
        <div class="row">
          <dt>País</dt>
          <dd id="country">-</dd>
        </div>
      </dl>
    </section>
  </main>

  <script>
    const form = document.querySelector("#bin-form");
    const binInput = document.querySelector("#bin");
    const submitButton = document.querySelector("#submit");
    const message = document.querySelector("#message");
    const result = document.querySelector("#result");

    const fields = {
      scheme: document.querySelector("#scheme"),
      issuer: document.querySelector("#issuer"),
      funding: document.querySelector("#funding"),
      country: document.querySelector("#country")
    };

    function normalizeDigits(value) {
      return value.replace(/\D/g, "");
    }

    function titleCase(value) {
      return String(value || "")
        .toLowerCase()
        .replace(/(^|\s|-)\S/g, (letter) => letter.toUpperCase());
    }

    function formatType(value) {
      const map = {
        credit: "Crédito",
        debit: "Débito",
        multiple: "Múltiplo",
        combo: "Múltiplo"
      };

      return map[String(value || "").toLowerCase()] || titleCase(value) || "-";
    }

    function setMessage(text, type = "info") {
      message.textContent = text;
      message.className = `message ${type} visible`;
    }

    function clearMessage() {
      message.textContent = "";
      message.className = "message";
    }

    function clearResult() {
      result.classList.remove("visible");
      Object.values(fields).forEach((field) => {
        field.textContent = "-";
      });
    }

    function showResult(data) {
      fields.scheme.textContent = titleCase(data.Scheme) || "-";
      fields.issuer.textContent = data.Issuer || "-";
      fields.funding.textContent = formatType(data.Type);
      fields.country.textContent = data.Country?.Name || data.Country?.A2 || "-";
      result.classList.add("visible");
    }

    binInput.addEventListener("beforeinput", (event) => {
      if (!event.data) return;
      const nextValue = normalizeDigits(
        binInput.value.slice(0, binInput.selectionStart) +
        event.data +
        binInput.value.slice(binInput.selectionEnd)
      );

      if (nextValue.length > 8) {
        event.preventDefault();
        clearResult();
        setMessage("Digite somente os 8 primeiros números. Não informe o cartão completo.", "error");
      }
    });

    binInput.addEventListener("paste", (event) => {
      const pastedDigits = normalizeDigits(event.clipboardData.getData("text"));

      if (pastedDigits.length > 8) {
        event.preventDefault();
        binInput.value = "";
        clearResult();
        setMessage("Colagem bloqueada: informe apenas os 8 primeiros números do cartão.", "error");
      }
    });

    binInput.addEventListener("input", () => {
      const digits = normalizeDigits(binInput.value);
      binInput.value = digits.slice(0, 8);
      if (digits.length <= 8) clearMessage();
    });

    form.addEventListener("submit", async (event) => {
      event.preventDefault();
      clearResult();
      clearMessage();

      const bin = normalizeDigits(binInput.value);

      if (!/^\d{8}$/.test(bin)) {
        setMessage("Digite exatamente 8 números.", "error");
        return;
      }

      submitButton.disabled = true;
      submitButton.textContent = "Consultando...";
      setMessage("Consultando BIN...", "info");

      try {
        const response = await fetch(`https://data.handyapi.com/bin/${bin}`);

        const payload = await response.json().catch(() => ({}));

        if (response.status === 429) {
          throw new Error("Limite de consultas da API pública atingido. Tente novamente mais tarde.");
        }

        if (!response.ok) {
          const errorText = payload.message || payload.error || "Não foi possível consultar o BIN.";
          throw new Error(errorText);
        }

        if (!payload || payload.Status !== "SUCCESS") {
          throw new Error("BIN não encontrado.");
        }

        clearMessage();
        showResult(payload);
      } catch (error) {
        clearResult();
        setMessage(error.message || "Não foi possível consultar o BIN.", "error");
      } finally {
        submitButton.disabled = false;
        submitButton.textContent = "Consultar";
      }
    });
  </script>
</body>
</html>
